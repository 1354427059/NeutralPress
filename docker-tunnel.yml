services:
  neutralpress-tunnel:
    image: alpine:latest
    container_name: neutralpress-tunnel
    restart: unless-stopped
    ports:
      - "1504:3000"
    entrypoint:
      - /bin/sh
      - -c
      - |
        apk add --no-cache openssh-client sshpass
        echo "Starting SSH tunnel to 38.76.217.176:4344 -> localhost:3000"
        sshpass -p 'HLXQj3v0GQp7' ssh \
          -o StrictHostKeyChecking=no \
          -o UserKnownHostsFile=/dev/null \
          -o ServerAliveInterval=30 \
          -o ServerAliveCountMax=3 \
          -o ExitOnForwardFailure=yes \
          -N -L 0.0.0.0:3000:localhost:3000 \
          root@38.76.217.176 -p 4344
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 3000 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
